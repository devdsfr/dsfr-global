services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dsfr
      POSTGRES_PASSWORD: dsfr
      POSTGRES_DB: dsfr_global
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/migrations/0001_create_users.up.sql:/docker-entrypoint-initdb.d/0001_create_users.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsfr -d dsfr_global"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../backend
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://dsfr:dsfr@postgres:5432/dsfr_global?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-only-secret-change-me
      ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
