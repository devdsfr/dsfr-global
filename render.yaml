# Render Blueprint for DSFR Global (lives at repo root; project is under ./dsfr-global)
# Docs: https://render.com/docs/blueprint-spec
#
# Provisions: Go API (Docker) + Angular static site.
# PostgreSQL is external (Neon) — set DATABASE_URL manually in the dashboard.
# Auth tokens (refresh/reset) are stored in Postgres, so no Redis is needed.

services:
  # ---- Backend API (Go + Gin, Docker) ----
  - type: web
    name: dsfr-global-api
    runtime: docker
    plan: free
    dockerfilePath: ./dsfr-global/backend/Dockerfile
    dockerContext: ./dsfr-global/backend
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: DATABASE_URL
        sync: false                  # paste your Neon pooled connection string here
      - key: ALLOWED_ORIGINS
        value: https://dsfr-global-web.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false                  # paste your Anthropic API key here (console.anthropic.com)
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001

  # ---- Frontend (Angular, static site) ----
  - type: web
    name: dsfr-global-web
    runtime: static
    buildCommand: cd dsfr-global/frontend && npm install && npm run build
    staticPublishPath: ./dsfr-global/frontend/dist/dsfr-global/browser
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
